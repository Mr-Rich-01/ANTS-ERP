# ANTS ERP — Produção (VPS Hostinger / Ubuntu / Cloudflare)
# Arquitectura: monólito Next.js (web) + worker BullMQ + Postgres + Redis + Caddy.
# Dockerfiles das apps preparados na P0-04; staging separado vive em docker-compose.staging.yml.
# Regras: Postgres e Redis NUNCA expostos publicamente — apenas o reverse-proxy publica 80/443.
services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - ants_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:?Set APP_URL}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
      PORT: ${PORT:-3000}
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ants_net

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    profiles:
      - migration
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ants_net

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ants_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    volumes:
      - ants_pgdata:/var/lib/postgresql/data
    # Sem `ports:` — acessível apenas na rede interna ants_net.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ants_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ants_redisdata:/data
    # Sem `ports:` — acessível apenas na rede interna ants_net.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ants_net

volumes:
  ants_pgdata:
  ants_redisdata:
  caddy_data:
  caddy_config:

networks:
  ants_net:
    driver: bridge
