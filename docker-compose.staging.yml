# ANTS ERP - staging validation environment.
# Run with: docker compose --env-file .env.staging -f docker-compose.staging.yml <command>
# Migrations are explicit through the `migration` profile; web/worker never run them on startup.
name: ants-erp-staging

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:?Set APP_URL in .env.staging}
      AUTH_URL: ${AUTH_URL:?Set AUTH_URL in .env.staging}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env.staging}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.staging}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.staging}
      PORT: ${PORT:-3000}
    ports:
      - "${STAGING_WEB_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - ants_staging_net

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.staging}
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL in .env.staging}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ants_staging_net

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: migrator
    profiles:
      - migration
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env.staging}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ants_staging_net

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.staging}
    volumes:
      - ants_staging_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ants_staging_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ants_staging_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ants_staging_net

volumes:
  ants_staging_pgdata:
  ants_staging_redisdata:

networks:
  ants_staging_net:
    driver: bridge
